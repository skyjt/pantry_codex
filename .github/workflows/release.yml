name: 构建发布包

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

env:
  CI: "true"
  NO_UPDATE_NOTIFIER: "1"
  ELECTRON_MIRROR: "https://github.com/electron/electron/releases/download/"
  ELECTRON_BUILDER_BINARIES_MIRROR: "https://github.com/electron-userland/electron-builder-binaries/releases/download/"

jobs:
  linux-debian10-uos20-x64:
    name: Debian 10 / UOS 20 x64
    runs-on: ubuntu-22.04
    container:
      image: node:18-buster
    steps:
      - name: 修正 Debian 10 archive 源并安装构建依赖
        shell: bash
        run: |
          set -euo pipefail
          cat >/etc/apt/sources.list <<'EOF'
          deb http://archive.debian.org/debian buster main contrib non-free
          deb http://archive.debian.org/debian-security buster/updates main contrib non-free
          deb http://archive.debian.org/debian buster-updates main contrib non-free
          EOF
          printf 'Acquire::Check-Valid-Until "false";\n' >/etc/apt/apt.conf.d/99no-check-valid-until
          apt-get update
          apt-get install -y --no-install-recommends \
            git ca-certificates python3 make g++ pkg-config dpkg fakeroot rpm \
            xvfb xauth dbus-x11 libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 \
            xdg-utils libatspi2.0-0 libuuid1 libfuse2 libasound2 libgbm1 \
            libdrm2 libx11-xcb1
          rm -rf /var/lib/apt/lists/*

      - name: 拉取源码
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 安装 npm 依赖
        run: npm ci

      - name: 重建 Debian 10 native 模块
        env:
          npm_config_build_from_source: "true"
        run: |
          npm run rebuild:electron
          node scripts/check-native-glibc.cjs node_modules/better-sqlite3/build/Release/better_sqlite3.node

      - name: 五连验证
        shell: bash
        run: |
          set -euo pipefail
          npm test
          npm run test:db
          npm run typecheck
          npm run build
          # CI 容器以 root 运行，Electron 启动冒烟需关闭 Chromium sandbox；应用运行时安全配置不变。
          xvfb-run -a npm run smoke -- --no-sandbox

      - name: 构建 Debian 10 / UOS 20 x64 产物
        env:
          # 决议 #60：禁用打包硬链接优化 —— deb 归档内跨 /usr 与 /opt 的硬链接
          # 条目会让 UOS 深度安装器解包失败（"断开的管道"）。
          USE_HARD_LINKS: "false"
        run: npm run dist:linux

      - name: 校验 Linux 打包 native 模块 glibc 基线
        run: node scripts/check-native-glibc.cjs

      - name: 校验 deb 归档无硬链接且安装路径无中文（决议 #60）
        shell: bash
        run: |
          set -euo pipefail
          deb=$(ls release/Teahouse-*-linux-amd64.deb)
          mkdir -p /tmp/deb-verify
          data=$(ar t "$deb" | grep '^data\.tar')
          ar p "$deb" "$data" > "/tmp/deb-verify/$data"
          listing=$(tar -tvf "/tmp/deb-verify/$data")
          if grep -P '^h' <<< "$listing"; then
            echo "deb 内含硬链接条目，UOS 深度安装器会失败" >&2
            exit 1
          fi
          if grep -P '[\x{4e00}-\x{9fff}]' <<< "$listing"; then
            echo "deb 安装路径含中文" >&2
            exit 1
          fi
          echo "deb 校验通过：无硬链接、无中文路径"

      - name: 生成 SHA-256 清单
        shell: bash
        run: |
          set -euo pipefail
          cd release
          shopt -s nullglob
          files=(Teahouse-*-linux-amd64.deb Teahouse-*-linux-x86_64.AppImage)
          if [ "${#files[@]}" -lt 2 ]; then
            ls -la
            echo "Linux 产物数量不足，期望 deb 与 AppImage 各一个。" >&2
            exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS-debian10-uos20-x64.txt

      - name: 上传 Linux 产物
        uses: actions/upload-artifact@v4
        with:
          name: pantry-debian10-uos20-x64
          if-no-files-found: error
          path: |
            release/Teahouse-*-linux-amd64.deb
            release/Teahouse-*-linux-x86_64.AppImage
            release/SHA256SUMS-debian10-uos20-x64.txt

  windows7-x64:
    name: Windows 7 x64
    runs-on: windows-2022
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm

      - name: 安装 npm 依赖
        run: npm ci

      - name: 五连验证
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          function Invoke-Checked {
            param([string]$Command, [string[]]$Arguments)
            & $Command @Arguments
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

          Invoke-Checked npm @('test')
          Invoke-Checked npm @('run', 'test:db')
          Invoke-Checked npm @('run', 'typecheck')
          Invoke-Checked npm @('run', 'build')
          Invoke-Checked npm @('run', 'smoke')

      - name: 构建 Win7 x64 产物
        run: npm run dist:win

      - name: 生成 SHA-256 清单
        shell: pwsh
        run: |
          $files = Get-ChildItem release -File | Where-Object {
            $_.Name -like 'Teahouse-*-win-x64-setup.exe' -or $_.Name -like 'Teahouse-*-win-x64-portable.exe'
          }
          if ($files.Count -lt 2) {
            Get-ChildItem release -File | Format-Table Name, Length
            throw "Windows 产物数量不足，期望 setup 与 portable 两个 exe。"
          }
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          $lines | Set-Content release/SHA256SUMS-win7-x64.txt -Encoding ascii

      - name: 上传 Windows 产物
        uses: actions/upload-artifact@v4
        with:
          name: pantry-win7-x64
          if-no-files-found: error
          path: |
            release/Teahouse-*-win-x64-setup.exe
            release/Teahouse-*-win-x64-portable.exe
            release/SHA256SUMS-win7-x64.txt

  macos-arm64:
    name: macOS arm64（Apple Silicon）
    runs-on: macos-14
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm

      - name: 安装 npm 依赖
        run: npm ci

      - name: 五连验证
        shell: bash
        run: |
          set -euo pipefail
          npm test
          npm run test:db
          npm run typecheck
          npm run build
          npm run smoke

      - name: 构建 macOS arm64 产物
        run: npm run dist:mac

      - name: 生成 SHA-256 清单
        shell: bash
        run: |
          set -euo pipefail
          cd release
          shopt -s nullglob
          files=(Teahouse-*-mac-arm64.dmg Teahouse-*-mac-arm64.zip)
          if [ "${#files[@]}" -lt 2 ]; then
            ls -la
            echo "macOS 产物数量不足，期望 dmg 与 zip 各一个。" >&2
            exit 1
          fi
          shasum -a 256 "${files[@]}" > SHA256SUMS-mac-arm64.txt

      - name: 上传 macOS 产物
        uses: actions/upload-artifact@v4
        with:
          name: pantry-mac-arm64
          if-no-files-found: error
          path: |
            release/Teahouse-*-mac-arm64.dmg
            release/Teahouse-*-mac-arm64.zip
            release/SHA256SUMS-mac-arm64.txt

  publish-github-release:
    name: 发布 GitHub Release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    needs:
      - linux-debian10-uos20-x64
      - windows7-x64
      - macos-arm64
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 拉取源码（获取完整提交历史与 tag）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 生成发布说明
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_TAG="${GITHUB_REF_NAME}"
          VERSION="${CURRENT_TAG#v}"

          # 找上一个 tag（按创建时间倒序排，跳过当前 tag）
          PREV_TAG=$(git tag -l --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -1 || true)

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
          else
            RANGE="${CURRENT_TAG}"
          fi

          # 解析 conventional commits，去除 scope 括号
          extract() {
            local pat="$1"
            git log "${RANGE}" --pretty=format:"%s" --no-merges 2>/dev/null \
              | grep -E "^${pat}(\([^)]*\))?: " \
              | sed -E "s/^[a-z]+(\([^)]*\))?: /- /" \
              || true
          }

          FEATURES=$(extract "feat")
          FIXES=$(extract "fix")
          OTHERS=$(extract "docs|chore|refactor|test|perf")

          {
            echo "## 更新内容"
            echo ""
            if [ -n "$FEATURES" ]; then
              echo "### ✨ 新功能"
              echo "$FEATURES"
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "### 🐛 问题修复"
              echo "$FIXES"
              echo ""
            fi
            if [ -n "$OTHERS" ]; then
              echo "### 🔧 其他变更"
              echo "$OTHERS"
              echo ""
            fi
            echo "---"
            echo ""
            echo "## 可用安装包"
            echo ""
            echo "| 平台 | 文件 | 说明 |"
            echo "|---|---|---|"
            echo "| Windows 7 SP1+ x64 | \`Teahouse-${VERSION}-win-x64-setup.exe\` | NSIS 安装包 |"
            echo "| Windows 7 SP1+ x64 | \`Teahouse-${VERSION}-win-x64-portable.exe\` | 便携版（免安装） |"
            echo "| Debian 10 / UOS 20 x64 | \`Teahouse-${VERSION}-linux-amd64.deb\` | dpkg 安装包（含信创） |"
            echo "| Debian 10 / UOS 20 x64 | \`Teahouse-${VERSION}-linux-x86_64.AppImage\` | 通用 AppImage |"
            echo "| macOS arm64（M 系列） | \`Teahouse-${VERSION}-mac-arm64.dmg\` | 磁盘映像 |"
            echo "| macOS arm64（M 系列） | \`Teahouse-${VERSION}-mac-arm64.zip\` | 压缩包 |"
            echo ""
            echo "> 每个平台产物附 SHA-256 校验清单（\`SHA256SUMS-*.txt\`）。"
            echo "> macOS 未签名构建，首次打开需在「系统设置 → 隐私与安全性」中允许，或执行 \`xattr -dr com.apple.quarantine /Applications/Teahouse.app\`。"
          } > release-notes.md

          echo "=== release-notes.md ==="
          cat release-notes.md
          echo "=== artifacts ==="
          find artifacts -type f | sort

      - name: 创建或更新 GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find artifacts -type f | sort)
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --title "茶话间 · Teahouse ${GITHUB_REF_NAME}" \
              --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" "${files[@]}" --repo "$GITHUB_REPOSITORY" \
              --title "茶话间 · Teahouse ${GITHUB_REF_NAME}" \
              --notes-file release-notes.md
          fi
